name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static quality and packaging
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check --config pyproject.toml .

      - name: Check formatting
        run: uv run ruff format --check --config pyproject.toml .

      - name: Type-check
        run: uv run pyright --project .

      - name: Test with branch coverage
        env:
          COVERAGE_FILE: ${{ runner.temp }}/.coverage
        run: >-
          uv run pytest
          -c pyproject.toml
          -q
          -p no:cacheprovider
          --cov
          --cov-config=pyproject.toml
          --cov-report=term-missing:skip-covered

      - name: Build and verify distribution
        shell: bash
        run: |
          uv build --out-dir dist
          uv run twine check dist/*
          test ! -e src/jharness/__init__.py
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          uv run --isolated --with "$wheel" python -I -c \
            "import jharness.tools; assert jharness.tools.__all__ == []"

  runtime:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Test
        run: uv run pytest -c pyproject.toml -q -p no:cacheprovider
